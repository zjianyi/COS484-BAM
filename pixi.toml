[workspace]
authors = ["brian <bw7520@princeton.edu>"]
channels = ["conda-forge"]
name = "cos484-bam"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.8"

[dependencies]
python = "3.10.*"
pip = "*"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]

[pypi-dependencies]
torch = "==2.7.0+cu128"
transformers = ">=5.0.0"
peft = ">=0.13.0"
accelerate = ">=1.0.0"
datasets = ">=3.0.0"
trl = ">=0.11.0"
mamba-ssm = ">=2.2.2"
causal-conv1d = ">=1.4.0"
python-dotenv = ">=1.0.0"
numpy = ">=1.26.0"
sentencepiece = ">=0.2.0"
protobuf = ">=4.25.0"

[tasks]
eval-babilong = "python -m bam.eval_babilongv2"
train-ablation = "python -m bam.train_babilong_ablation"
loss-probe = "python -m bam.loss_probe"
check-falcon-mamba = "python -c \"from transformers.models.falcon_mamba.modeling_falcon_mamba import is_fast_path_available; print(is_fast_path_available())\""
