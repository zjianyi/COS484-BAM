[workspace]
authors = ["brian <bw7520@princeton.edu>"]
channels = ["conda-forge"]
name = "cos484-bam"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.8"

[dependencies]
python = "3.10.*"
pip = "*"
ninja = "*"
packaging = "*"
setuptools = "*"
wheel = "*"

[pypi-options]
index-url = "https://pypi.org/simple"
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]
index-strategy = "unsafe-best-match"
no-build-isolation = ["causal-conv1d", "mamba-ssm"]

[pypi-dependencies]
torch = "==2.7.0+cu128"
transformers = ">=4.48.0,<5"
peft = ">=0.13.0"
accelerate = ">=1.0.0"
datasets = ">=3.0.0"
trl = ">=0.11.0"
mamba-ssm = { url = "https://github.com/state-spaces/mamba/releases/download/v2.3.1/mamba_ssm-2.3.1%2Bcu12torch2.7cxx11abiTRUE-cp310-cp310-linux_x86_64.whl" }
causal-conv1d = { url = "https://github.com/Dao-AILab/causal-conv1d/releases/download/v1.6.1.post4/causal_conv1d-1.6.1%2Bcu12torch2.7cxx11abiTRUE-cp310-cp310-linux_x86_64.whl" }
python-dotenv = ">=1.0.0"
numpy = ">=1.26.0"
sentencepiece = ">=0.2.0"
protobuf = ">=4.25.0"

[tasks]
eval-babilong = "python -m bam.eval_babilongv2"
train-ablation = "python -m bam.train_babilong_ablation"
loss-probe = "python -m bam.loss_probe"
check-falcon-mamba = "python -c \"from transformers.models.falcon_mamba.modeling_falcon_mamba import is_fast_path_available; print(is_fast_path_available())\""
